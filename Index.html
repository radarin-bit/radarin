<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Scanner NoorMosque</title>
    <!-- Engine Scanner Utama jsQR -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        body, html { 
            width: 100%; 
            height: 100%; 
            background-color: #000000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        #video-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            max-width: 500px; 
            max-height: 600px; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        /* Lapisan Frame Target Kotak Hijau Bidik Kupon */
        .scanner-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            pointer-events: none; 
        }
        .target-box { 
            width: 260px; 
            height: 260px; 
            border: 4px solid #198754; 
            border-radius: 24px; 
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.6); 
            position: relative; 
        }
        
        /* Siku Pojok Dekorasi Tambahan */
        .target-box::before, .target-box::after { 
            content: ''; 
            position: absolute; 
            width: 20px; 
            height: 20px; 
            border-color: #ffc107; 
            border-style: solid; 
            border-width: 0; 
        }
        .target-box::before { 
            top: -4px; 
            left: -4px; 
            border-top-width: 4px; 
            border-left-width: 4px; 
            border-top-left-radius: 16px; 
        }
        .target-box::after { 
            bottom: -4px; 
            right: -4px; 
            border-bottom-width: 4px; 
            border-right-width: 4px; 
            border-bottom-right-radius: 16px; 
        }
        
        /* Garis Animasi Laser Scanner Bergerak */
        .scan-line { 
            position: absolute; 
            top: 0; 
            left: 5%; 
            width: 90%; 
            height: 3px; 
            background: linear-gradient(90deg, transparent, #198754, transparent); 
            animation: scanMove 2s linear infinite; 
        }
        .hint-text { 
            color: #ffffff; 
            font-size: 0.9rem; 
            font-weight: 600; 
            text-align: center; 
            margin-top: 20px; 
            background: rgba(0,0,0,0.7); 
            padding: 8px 16px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); 
            position: absolute; 
            bottom: 40px; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8); 
        }
        
        /* Tombol Silang Manual Close di Kanan Atas */
        .close-btn { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: rgba(255, 255, 255, 0.2); 
            border: none; 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            color: white; 
            font-size: 1.2rem; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(5px); 
            -webkit-backdrop-filter: blur(5px); 
            pointer-events: auto; 
            z-index: 100; 
        }
        
        @keyframes scanMove { 
            0% { top: 0%; } 
            50% { top: 100%; } 
            100% { top: 0%; } 
        }
    </style>
</head>
<body>

    <button class="close-btn" onclick="window.close()">×</button>

    <div id="video-container">
        <video id="webcam-preview" autoplay playsinline muted></video>
        <div class="scanner-overlay">
            <div class="target-box">
                <div class="scan-line"></div>
            </div>
            <div class="hint-text">Paskan QR Kupon di dalam kotak</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam-preview');
        let currentStream = null;
        let animationId = null;

        // Inisialisasi hardware kamera di domain HTTPS bersih luar sandbox
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 }, focusMode: 'continuous' },
            audio: false
        })
        .then(stream => {
            currentStream = stream;
            video.srcObject = stream;
            
            video.onloadedmetadata = () => {
                video.play();
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // Real-time loop scanner 60 FPS
                const tick = () => {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const code = jsQR(imageData.data, canvas.width, canvas.height);
                        
                        // Jika QR Code warga terdeteksi masuk kotak target
                        if (code && code.data.trim() !== "") {
                            // Oper teks QR ke Web App utama (NoorMosque)
                            if (window.opener) {
                                window.opener.postMessage({ type: 'NOORMOSQUE_QR_DATA', data: code.data }, '*');
                            }
                            
                            // Matikan stream hardware kamera
                            if (currentStream) {
                                currentStream.getTracks().forEach(track => track.stop());
                            }
                            // Auto close jendela popup melayang kembali ke dasbor
                            window.close();
                            return;
                        }
                    }
                    animationId = requestAnimationFrame(tick);
                };
                animationId = requestAnimationFrame(tick);
            };
        })
        .catch(err => {
            alert("Gagal membuka kamera: " + err.message + "\nPastikan izin browser aktif.");
            window.close();
        });

        // Bersihkan memori jika jendela ditutup paksa
        window.addEventListener('unload', () => {
            if (animationId) cancelAnimationFrame(animationId);
            if (currentStream) currentStream.getTracks().forEach(track => track.stop());
        });
    </script>
</body>
</html>
