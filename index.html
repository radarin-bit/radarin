<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RADARIN</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RADARIN">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    /* Mengunci iframe agar penuh seukuran layar HP tanpa scrollbar ganda */
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <iframe src="https://script.google.com/macros/s/AKfycbyNqSAT708hDVQxCbe-3BgUkghgjTyKMJIZODTTACH5pVc_Q38tW3RrGitHk66frV_Eww/exec"></iframe>

  <script>
    // Engine pendaftar Service Worker agar tombol "Install Aplikasi" aktif di Android
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('RADARIN PWA: Service Worker Aktif!', reg))
          .catch(err => console.log('RADARIN PWA: Gagal Registrasi SE', err));
      });
    }
  </script>
</body>
</html>
